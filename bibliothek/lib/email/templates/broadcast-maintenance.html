<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{subject}}</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
    .container { max-width: 520px; margin: 40px auto; background: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .header { background: #e65100; color: #fff; padding: 28px 32px; }
    .header-eyebrow { font-size: 12px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; opacity: 0.85; margin-bottom: 6px; }
    .header h1 { margin: 0; font-size: 22px; font-weight: 700; line-height: 1.3; }
    .header-brand { margin-top: 8px; font-size: 13px; opacity: 0.75; }
    .body { padding: 32px; color: #333; }
    .body p { margin: 0 0 16px; line-height: 1.6; }
    .notice { background: #fff3e0; border: 1px solid #ffb74d; border-radius: 6px; padding: 12px 16px; margin-bottom: 20px; font-size: 14px; font-weight: 600; color: #bf360c; }
    .message { background: #fff8f5; border-left: 4px solid #e65100; border-radius: 0 6px 6px 0; padding: 16px 20px; margin: 0 0 20px; white-space: pre-wrap; line-height: 1.7; color: #333; }
    .time-box { display: inline-block; background: #fbe9e7; border-radius: 6px; padding: 8px 16px; margin-bottom: 20px; font-size: 14px; color: #bf360c; font-weight: 600; }
    .footer { background: #f9f9f9; border-top: 1px solid #eee; padding: 16px 32px; font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-eyebrow">🔧 Wartungshinweis</div>
      <h1>{{subject}}</h1>
      <div class="header-brand">📚 Bibliothek</div>
    </div>
    <div class="body">
      <div class="notice">⚠ Die Bibliothek ist während dieser Zeit möglicherweise nicht erreichbar.</div>
      <div class="message">{{message}}</div>
      {{#if timeFrom}}
      <div class="time-box">🕐 Zeitraum: {{timeFrom}}{{#if timeTo}} bis {{timeTo}}{{/if}}</div>
      {{/if}}
    </div>
    <div class="footer">
      Diese Nachricht wurde vom Bibliotheks-Administrator an alle Nutzer gesendet.
    </div>
  </div>
</body>
</html>
