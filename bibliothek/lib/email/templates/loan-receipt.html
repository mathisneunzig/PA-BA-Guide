<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buch ausgeliehen</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
    .container { max-width: 520px; margin: 40px auto; background: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .header { background: #1976d2; color: #fff; padding: 28px 32px; }
    .header h1 { margin: 0; font-size: 22px; font-weight: 700; }
    .body { padding: 32px; color: #333; }
    .body p { margin: 0 0 16px; line-height: 1.6; }
    .info-box { background: #e3f2fd; border-left: 4px solid #1976d2; border-radius: 4px; padding: 16px 20px; margin: 20px 0; }
    .info-box p { margin: 4px 0; font-size: 14px; }
    .book-list { margin: 0; padding: 0 0 0 18px; }
    .book-list li { margin: 3px 0; font-size: 14px; }
    .btn { display: inline-block; margin: 8px 0 20px; padding: 12px 28px; background: #1976d2; color: #ffffff !important; text-decoration: none; border-radius: 6px; font-weight: 600; font-size: 15px; }
    .footer { background: #f9f9f9; border-top: 1px solid #eee; padding: 16px 32px; font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📚 Viel Spaß beim Lesen!</h1>
    </div>
    <div class="body">
      <p>Du hast erfolgreich Bücher ausgeliehen. Bitte gib sie rechtzeitig zurück.</p>
      <div class="info-box">
        <p><strong>Bücher:</strong></p>
        <ul class="book-list">{{bookList}}</ul>
        <p style="margin-top:10px"><strong>Rückgabe bis:</strong> {{dueDate}}</p>
      </div>
      <a class="btn" href="{{loanUrl}}">Ausleihdetails ansehen</a>
    </div>
    <div class="footer">
      Du hast diese E-Mail erhalten, weil du ein Konto in unserer Bibliothek hast.
    </div>
  </div>
</body>
</html>
