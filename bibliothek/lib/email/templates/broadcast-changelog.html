<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{subject}}</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
    .container { max-width: 520px; margin: 40px auto; background: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .header { background: #00695c; color: #fff; padding: 28px 32px; }
    .header-eyebrow { font-size: 12px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; opacity: 0.85; margin-bottom: 6px; }
    .header h1 { margin: 0; font-size: 22px; font-weight: 700; line-height: 1.3; }
    .header-brand { margin-top: 8px; font-size: 13px; opacity: 0.75; }
    .body { padding: 32px; color: #333; }
    .body p { margin: 0 0 16px; line-height: 1.6; }
    .message { background: #e0f2f1; border-left: 4px solid #00695c; border-radius: 0 6px 6px 0; padding: 16px 20px; margin: 0 0 20px; white-space: pre-wrap; line-height: 1.7; color: #1a2e2b; }
    .badge { display: inline-block; background: #b2dfdb; border-radius: 20px; padding: 4px 14px; font-size: 12px; color: #004d40; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 16px; }
    .footer { background: #f9f9f9; border-top: 1px solid #eee; padding: 16px 32px; font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-eyebrow">🚀 Software-Update</div>
      <h1>{{subject}}</h1>
      <div class="header-brand">📚 Bibliothek</div>
    </div>
    <div class="body">
      <div class="badge">Neu in dieser Version</div>
      <div class="message">{{message}}</div>
    </div>
    <div class="footer">
      Diese Nachricht wurde vom Bibliotheks-Administrator an alle Nutzer gesendet.
    </div>
  </div>
</body>
</html>
